name: Pipeline + Site Update

on:
  schedule:
    - cron: "0 7 * * *"      # daily at 7am UTC — newsletter sync + granola + ingest queue all in one job
    - cron: "0 4 * * 0"      # weekly on Sunday 4am UTC — topic concentration report
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Run newsletter sync (fetch Gmail → add to Ingest Queue)
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
          NOTION_READING_LIST_ID:   ${{ secrets.NOTION_READING_LIST_ID }}
          NOTION_INGEST_QUEUE_ID:   ${{ secrets.NOTION_INGEST_QUEUE_ID }}
          NOTION_PARENT_PAGE_ID:    ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NEWSLETTER_EMAIL:         ${{ secrets.NEWSLETTER_EMAIL }}
          NEWSLETTER_EMAIL_PASSWORD: ${{ secrets.NEWSLETTER_EMAIL_PASSWORD }}
        run: python newsletter_sync.py
        # No continue-on-error — Gmail failures now surface as visible job failures

      - name: Run granola sync (Talks/ → Ingest Queue)
        env:
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
          NOTION_READING_LIST_ID:   ${{ secrets.NOTION_READING_LIST_ID }}
          NOTION_INGEST_QUEUE_ID:   ${{ secrets.NOTION_INGEST_QUEUE_ID }}
        run: python granola_sync.py
        continue-on-error: true

      - name: Process Ingest Queue → Reading List
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
          NOTION_READING_LIST_ID:   ${{ secrets.NOTION_READING_LIST_ID }}
          NOTION_INGEST_QUEUE_ID:   ${{ secrets.NOTION_INGEST_QUEUE_ID }}
        run: python ingest_queue.py poll --once

      - name: Run eval agent (pipeline health + score last 5 KB entries)
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
          NOTION_EVAL_DB_ID:        ${{ secrets.NOTION_EVAL_DB_ID }}
          NOTION_INGEST_QUEUE_ID:   ${{ secrets.NOTION_INGEST_QUEUE_ID }}
          NOTION_READING_LIST_ID:   ${{ secrets.NOTION_READING_LIST_ID }}
        run: python eval/eval_agent.py spot --n 5
        continue-on-error: true   # eval failure should never block the pipeline

      - name: Send morning digest email
        env:
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_READING_LIST_ID:   ${{ secrets.NOTION_READING_LIST_ID }}
          NEWSLETTER_EMAIL:         ${{ secrets.NEWSLETTER_EMAIL }}
          NEWSLETTER_EMAIL_PASSWORD: ${{ secrets.NEWSLETTER_EMAIL_PASSWORD }}
          MY_MAIN_EMAIL:            ${{ secrets.MY_MAIN_EMAIL }}
        run: python morning_digest.py
        continue-on-error: true   # don't fail the pipeline if digest has nothing to send

      - name: Generate site data (Notion → docs/data.json)
        env:
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
          NOTION_READING_LIST_ID:   ${{ secrets.NOTION_READING_LIST_ID }}
        run: python generate_site_data.py

      - name: Run topic concentration report (weekly — Sundays only)
        if: github.event.schedule == '0 4 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN:             ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:             ${{ secrets.NOTION_DB_ID }}
          NOTION_PARENT_PAGE_ID:    ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python topic_concentration.py
        continue-on-error: true   # don't block the pipeline if topic report fails

      - name: Commit updated data.json, chroma_db, and topic data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/topic_data.json chroma_db/ || true
          git diff --staged --quiet || git commit -m "chore: auto-update pipeline data [skip ci]"
          git push
          # logs/ and exports/ are intentionally excluded — they may contain private email/meeting content
